<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset='utf-8'>
  <meta http-equiv="x-ua-compatible" content="IE=edge">
  <link rel="shortcut icon" href="favicon.png">
  <meta name="viewport" content="width=device-width,height=device-height">
  <title>FIDO MDS Explorer</title>
  <meta name="description" content="Online FIDO MDS parser and reader">
  <link rel="stylesheet" href="css/mds-explorer.css">
  <script src="js/x509.js"></script>
  <!-- privacy-friendly usage stats -->
  <script>
    window.goatcounter = {
      path: function(p) { return location.host + p } // add domain name
    }
    // Only load on production environment, and manually opted-out
    if ((window.location.host !== 'opotonniee.github.io') ||
      (localStorage.getItem("goatcounter." + location.host) === "false") ||
      (localStorage.getItem("goatcounter.ALL") === "false")) {
      window.goatcounter.no_onload = true;
    }
  </script>
  <script data-goatcounter="https://fido-mds-explorer.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>

<body>
  <h1>
    FIDO MDS Explorer
    <span id="about">
      <a href="https://github.com/opotonniee/fido-mds-explorer">
        <img src="img/github-mark.svg" alt="github icon" class="icon">
      </a>
    </span>
  </h1>

  <div id="mds-switch">Explore <a href="./convenience.html">Convenience MDS</a></div>
  <div id="mds-loading">Loading...</div>
  <div id="mds-error" class="error" hidden>
    <h2>Error</h2>
    Failed to load the metadata :(
  </div>

  <div id="mds" hidden>
    <span class="last-update">MDS data updated on <a href="https://github.com/opotonniee/fido-mds-explorer/commits/main/js/mds.js"><span id="last-update-date">??</span></a></span>
    <h2>List of registered authenticators</h2>
    <p>Click on authenticator name to view details - Show columns:
      <select id="shown-columns">
        <option value="few">Few</option>
        <option value="all">All</option>
      </select>
      - Number of entries: <span id="table-size"></span>
    </p>
    <div id="mds-table"></div>
    <div class="table-footer"></div>

  </div>

  <div id="authr" hidden>
    <h3>
      <span id="authr-close" class="clickable">⬅ BACK</span>
    </h3>
    <h2 id="authr-name">tbd</h2>
    <div id="authr-json"></div>
  </div>

  <footer>This site is not affiliated to FIDO Alliance</footer>

  <script src="js/mds.js"></script>
  <script src="js/last-mds-update.js"></script>
  <script src="js/vendors.js"></script>
  <script src="js/custom-table.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/mds-explorer.js"></script>
</body>
</html>
